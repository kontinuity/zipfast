name: Dev Images

# Rapid releases: every merge to main publishes a fresh multi-arch image so the
# `main` / `edge` tags always reflect the tip of the default branch.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  push:
    name: build & push (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    # Native runners per arch (no QEMU) keep builds fast.
    runs-on: ubuntu-24.04${{ matrix.arch == 'arm64' && '-arm' || '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          provenance: false
          build-args: |
            ZIPFAST_VERSION=main-${{ steps.sha.outputs.short_sha }}
          tags: |
            ${{ env.GHCR_IMAGE }}:main-${{ matrix.arch }}
            ${{ env.GHCR_IMAGE }}:main-${{ steps.sha.outputs.short_sha }}-${{ matrix.arch }}

  manifest:
    name: multi-arch manifests
    runs-on: ubuntu-24.04
    needs: push
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create & push multi-arch manifests
        env:
          SHORT_SHA: ${{ steps.sha.outputs.short_sha }}
        run: |
          set -euo pipefail
          for tag in "main" "main-${SHORT_SHA}" "edge"; do
            docker buildx imagetools create -t "${GHCR_IMAGE}:${tag}" \
              "${GHCR_IMAGE}:main-amd64" \
              "${GHCR_IMAGE}:main-arm64"
          done
