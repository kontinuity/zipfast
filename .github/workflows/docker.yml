name: Dev Images

# Rapid releases: every merge to main publishes a fresh multi-arch image so the
# `main` / `edge` tags always reflect the tip of the default branch.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  push:
    name: build & push (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    # Native runners per arch (no QEMU) keep builds fast.
    runs-on: ubuntu-24.04${{ matrix.arch == 'arm64' && '-arm' || '' }}
    env:
      # secrets can't be read in a step-level `if:`, so resolve once here.
      HAS_DOCKERHUB: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: env.HAS_DOCKERHUB == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: tags
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          ARCH: ${{ matrix.arch }}
          SHORT_SHA: ${{ steps.sha.outputs.short_sha }}
        run: |
          {
            echo "tags<<EOF"
            echo "${GHCR_IMAGE}:main-${ARCH}"
            echo "${GHCR_IMAGE}:main-${SHORT_SHA}-${ARCH}"
            if [ -n "${DOCKERHUB_USERNAME}" ]; then
              echo "${DOCKERHUB_USERNAME}/zipfast:main-${ARCH}"
              echo "${DOCKERHUB_USERNAME}/zipfast:main-${SHORT_SHA}-${ARCH}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          provenance: false
          build-args: |
            ZIPFAST_VERSION=main-${{ steps.sha.outputs.short_sha }}
          tags: ${{ steps.tags.outputs.tags }}

  manifest:
    name: multi-arch manifests
    runs-on: ubuntu-24.04
    needs: push
    permissions:
      contents: read
      packages: write
    env:
      HAS_DOCKERHUB: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: env.HAS_DOCKERHUB == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create & push multi-arch manifests
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          SHORT_SHA: ${{ steps.sha.outputs.short_sha }}
        run: |
          set -euo pipefail
          combine() {
            repo="$1"
            for tag in "main" "main-${SHORT_SHA}" "edge"; do
              docker buildx imagetools create -t "${repo}:${tag}" \
                "${repo}:main-amd64" \
                "${repo}:main-arm64"
            done
          }
          combine "${GHCR_IMAGE}"
          if [ -n "${DOCKERHUB_USERNAME}" ]; then
            combine "${DOCKERHUB_USERNAME}/zipfast"
          fi
