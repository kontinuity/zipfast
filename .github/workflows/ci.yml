name: CI

# Pull-request / merge gate. Every PR into main (and every push to main) must
# pass these checks before it can be merged. Keep this fast so review cycles
# stay short.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref so rapid PR pushes don't pile up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go:
    name: Go — fmt / vet / build / test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt check
        run: |
          out=$(gofmt -l ./internal ./cmd)
          if [ -n "$out" ]; then
            echo "::error::These files are not gofmt-clean:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Build binaries
        run: |
          ver="ci-${GITHUB_SHA::7}"
          go build -trimpath -ldflags "-s -w -X main.version=${ver}" -o /tmp/zipfast ./cmd/zipfast
          go build -trimpath -ldflags "-s -w -X main.version=${ver}" -o /tmp/zipfastctl ./cmd/zipfastctl

      - name: Test
        run: go test ./...

  golangci:
    name: golangci-lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # Install the pinned binary directly rather than golangci/golangci-lint-action,
      # which still ships a Node 20 runtime (deprecation warning + punycode notice).
      # A plain run step uses no Node action. v2.12.2 is built with Go 1.26, so it
      # can lint our Go 1.25 target (the v1.x the action pulled could not).
      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/v2.12.2/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.12.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m

  web:
    name: Web — SPA build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false
          # The packageManager field lives in web/package.json (repo root is Go).
          package_json_file: web/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install
        working-directory: web
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build
        working-directory: web
        run: pnpm run build

  docker:
    name: Docker — image builds (no push)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (amd64, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ZIPFAST_VERSION=ci-${{ github.sha }}
