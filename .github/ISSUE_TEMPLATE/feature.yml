name: Feature / Parity Request
description: Suggest a feature, or request parity with an upstream Zipline capability
title: "Feature: [short description]"
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or gap.
    validations:
      required: true

  - type: input
    id: upstream
    attributes:
      label: Upstream Zipline reference (optional)
      description: Link to the Zipline feature, docs, or PR if this is a parity request.
      placeholder: "https://github.com/diced/zipline/..."
    validations:
      required: false

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: false
