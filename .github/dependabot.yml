version: 2
updates:
  # Go modules (server).
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels: ["dependencies", "go"]
    commit-message:
      prefix: "go(deps)"

  # Web SPA dependencies.
  - package-ecosystem: npm
    directory: "/web"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels: ["dependencies", "web"]
    commit-message:
      prefix: "web(deps)"

  # GitHub Actions used by the workflows below.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "ci(deps)"

  # Base images referenced in the Dockerfile.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: "docker(deps)"
